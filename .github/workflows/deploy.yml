name: Deploy to STRATO (FTP)

on:
  push:
    branches: ["main"]

concurrency:
  group: deploy-strato
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Upload via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.STRATO_SFTP_HOST }}
          username: ${{ secrets.STRATO_SFTP_USER }}
          password: ${{ secrets.STRATO_SFTP_PASS }}
          local-dir: ./public/
          server-dir: ${{ secrets.STRATO_FTP_PATH }}
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
