name: Deploy to STRATO (SFTP)

on:
  push:
    branches: ["main"]

concurrency:
  group: deploy-strato
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install lftp
        run: sudo apt-get install -y lftp

      - name: Deploy via SFTP
        run: |
          lftp -u "${{ secrets.STRATO_SFTP_USER }}","${{ secrets.STRATO_SFTP_PASS }}" \
               -e "set sftp:auto-confirm yes; mirror -R --parallel=4 ./public/ ${{ secrets.STRATO_SFTP_PATH }}; bye" \
               sftp://${{ secrets.STRATO_SFTP_HOST }}
