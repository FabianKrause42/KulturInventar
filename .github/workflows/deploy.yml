name: Deploy to STRATO (SFTP)

on:
  push:
    branches: ["main"]

concurrency:
  group: deploy-strato
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # public/ → Web-Root (STRATO_SFTP_PATH, z.B. /html oder /)
      - name: Upload public/ to web root
        uses: wlixcc/SFTP-Deploy-Action@v1.2.5
        with:
          username: ${{ secrets.STRATO_SFTP_USER }}
          password: ${{ secrets.STRATO_SFTP_PASS }}
          server: ${{ secrets.STRATO_SFTP_HOST }}
          port: 22
          local_path: "./public/*"
          remote_path: "${{ secrets.STRATO_SFTP_PATH }}"
          delete_remote_files: false
          sftp_only: true

      # src/ → STRATO_SFTP_ROOT (eine Ebene über html, z.B. /)
      - name: Upload src/ outside web root
        uses: wlixcc/SFTP-Deploy-Action@v1.2.5
        with:
          username: ${{ secrets.STRATO_SFTP_USER }}
          password: ${{ secrets.STRATO_SFTP_PASS }}
          server: ${{ secrets.STRATO_SFTP_HOST }}
          port: 22
          local_path: "./src/*"
          remote_path: "${{ secrets.STRATO_SFTP_ROOT }}/src"
          delete_remote_files: false
          sftp_only: true

      # database/ → STRATO_SFTP_ROOT
      - name: Upload database/ outside web root
        uses: wlixcc/SFTP-Deploy-Action@v1.2.5
        with:
          username: ${{ secrets.STRATO_SFTP_USER }}
          password: ${{ secrets.STRATO_SFTP_PASS }}
          server: ${{ secrets.STRATO_SFTP_HOST }}
          port: 22
          local_path: "./database/*"
          remote_path: "${{ secrets.STRATO_SFTP_ROOT }}/database"
          delete_remote_files: false
          sftp_only: true
