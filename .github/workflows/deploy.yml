name: Deploy to STRATO (SFTP)

on:
  push:
    branches: ["main"]

concurrency:
  group: deploy-strato
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install lftp
        run: sudo apt-get install -y lftp

      - name: Setup SSH key
        run: |
          mkdir -p "$HOME/.ssh"
          printf '%s\n' "${{ secrets.STRATO_SSH_KEY }}" > "$HOME/.ssh/deploy_key"
          chmod 600 "$HOME/.ssh/deploy_key"

      - name: Deploy via SFTP
        env:
          SFTP_USER: ${{ secrets.STRATO_SFTP_USER }}
          SFTP_HOST: ${{ secrets.STRATO_SFTP_HOST }}
          SFTP_PATH: ${{ secrets.STRATO_SFTP_PATH }}
        run: |
          KEY="$HOME/.ssh/deploy_key"
          lftp -u "$SFTP_USER" \
               -e "set sftp:connect-program 'ssh -i $KEY -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null'; \
                   mirror -R --parallel=4 ./public/ $SFTP_PATH; \
                   bye" \
               "sftp://$SFTP_HOST"
